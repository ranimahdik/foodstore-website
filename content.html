<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to FoodStore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {font-family: Poppins,Arial,sans-serif; background: linear-gradient(120deg, #f093fb 0%, #f5576c 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .container {background:#fff;padding:2.2em 2em 1.5em 2em;border-radius:18px;box-shadow:0 2px 12px #f093fb50;max-width:350px;width:100%;}
    .msg {color:#f5576c;}
    .btn {width:100%;padding:0.8em 0;background:#f5576c;color:#fff;border:none;border-radius:30px;font-size:1.1em;font-weight:700;cursor:pointer;transition:background .2s;box-shadow:0 2px 10px #f093fb40;margin-top:2em;}
    .btn:hover {background: #c44353;}
  </style>
</head>
<body>
<div class="container" style="text-align:center;">
  <div class="msg" style="font-size:1.22em;margin-bottom:0.7em;">Welcome</div>
  <div>
    <b>Email:</b> food@email.com<br>
    <b>Contact:</b> 03123456789
  </div>
</div>
</body>
</html>
